<div class="container">
  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen">
    <h2 class="logo">Billing Software</h2>

    <nav>
      <a
        *ngFor="let menu of menuList"
        [routerLink]="menu.route"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        {{ menu.label }}
      </a>
    </nav>
  </aside>

  <!-- Mobile Overlay -->
  <div class="mobile-overlay" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>

  <!-- Main Content -->
  <main class="main">
    <header class="topbar">
      <div class="top-left">
        <button class="hamburger-btn" (click)="toggleSidebar()" title="Toggle Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <h3>Welcome to Billing</h3>
      </div>

      <div class="top-right">
        <span class="username">👤 {{ username }}</span>
        <button class="logout-btn" (click)="logout()">Logout</button>
      </div>
    </header>

    <section class="content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
