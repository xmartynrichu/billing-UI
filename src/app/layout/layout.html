<div class="container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">Billing Software</h2>

    <nav>
      <a
        *ngFor="let menu of menuList"
        [routerLink]="menu.route"
        routerLinkActive="active"
      >
        {{ menu.label }}
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <header class="topbar">
      <div class="top-left">
        <h3>Welcome to Billing</h3>
      </div>

      <div class="top-right">
        <span class="username">👤 {{ username }}</span>
        <button class="logout-btn" (click)="logout()">Logout</button>
      </div>
    </header>

    <section class="content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
