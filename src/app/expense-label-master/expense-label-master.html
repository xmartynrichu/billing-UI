<div class="label-container">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>🏷️ Expense Label Master</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="labelForm" (ngSubmit)="addLabel()" class="form-grid">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Label Name</mat-label>
          <input matInput formControlName="label_name" placeholder="Enter label name">
          <mat-icon matPrefix>label</mat-icon>
          <mat-error *ngIf="labelForm.get('label_name')?.hasError('required')">Label name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Amount</mat-label>
          <input matInput type="number" formControlName="amount" placeholder="Enter amount">
          <mat-icon matPrefix>currency_rupee</mat-icon>
          <mat-error *ngIf="labelForm.get('amount')?.hasError('required')">Amount is required</mat-error>
        </mat-form-field>
      </form>
    </mat-card-content>

    <mat-card-actions align="end" class="button-group">
      <button mat-raised-button color="primary" type="submit" [disabled]="labelForm.invalid" (click)="addLabel()" matTooltip="Add/Update label">
        <mat-icon>{{ editingId !== null ? 'update' : 'add_circle' }}</mat-icon>
        {{ editingId !== null ? 'Update Label' : 'Add Label' }}
      </button>
      <button mat-raised-button color="accent" type="button" (click)="cancelEdit()" *ngIf="editingId !== null" matTooltip="Cancel edit">
        <mat-icon>close</mat-icon>
        Cancel
      </button>
    </mat-card-actions>
  </mat-card>

  <mat-card class="table-card">
    <mat-card-header>
      <mat-card-title>📊 Label Registry</mat-card-title>
      <div class="header-actions">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>🔍 Search by any field</mat-label>
          <input matInput [(ngModel)]="filterValue" (ngModelChange)="applyFilter($event)" placeholder="Search ID, Label, Amount...">
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
        <button mat-raised-button class="download-btn green-btn" (click)="downloadExcel()" [disabled]="dataSource.data.length === 0" matTooltip="Download as Excel">
          <mat-icon>table_chart</mat-icon>
          Download Excel
        </button>
      </div>
    </mat-card-header>

    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="dataSource" class="full-width-table">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let label">{{ label.id }}</td>
        </ng-container>

        <ng-container matColumnDef="label_name">
          <th mat-header-cell *matHeaderCellDef>Label Name</th>
          <td mat-cell *matCellDef="let label">{{ label.label_name }}</td>
        </ng-container>

        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef>Amount</th>
          <td mat-cell *matCellDef="let label">₹{{ label.amt | number:'1.0-0' }}</td>
        </ng-container>

        <ng-container matColumnDef="createdby">
          <th mat-header-cell *matHeaderCellDef>Created By</th>
          <td mat-cell *matCellDef="let label">{{ label.createdby }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let label" class="action-cell">
            <button mat-icon-button color="primary" (click)="editLabel(label)" matTooltip="Edit label">
              <mat-icon>edit_square</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteLabel(label.id)" matTooltip="Delete label">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      </table>
      <mat-paginator #paginator [pageSizeOptions]="[5, 10, 25, 50]" showFirstLastButtons [pageSize]="10"></mat-paginator>
    </div>
  </mat-card>
</div>
