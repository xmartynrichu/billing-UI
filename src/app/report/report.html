<div class="report-container">
  <mat-card class="table-card" *ngIf="displayedColumns.length">
    <mat-card-header>
      <mat-card-title>📊 Expense Report</mat-card-title>
      <button mat-raised-button class="download-btn green-btn" (click)="downloadExcel()" [disabled]="data.length === 0" matTooltip="Download as Excel">
        <mat-icon>table_chart</mat-icon>
        Download Excel
      </button>
    </mat-card-header>

    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="data" class="full-width-table">

        <!-- Dynamic columns (excluding 'actions') -->
        <ng-container *ngFor="let column of displayedColumns" [matColumnDef]="column">
          <th mat-header-cell *matHeaderCellDef>
            {{ column !== 'actions' ? (column | titlecase) : 'Actions' }}
          </th>

          <td mat-cell *matCellDef="let element">
            <!-- Show normal data -->
            <ng-container *ngIf="column !== 'actions'; else actions">
              {{ element[column] }}
            </ng-container>

            <!-- Actions column -->
            <ng-template #actions>
              <div class="action-cell">
                <button mat-icon-button color="warn" (click)="deleteExpense(element.id)" matTooltip="Delete expense">
                  <mat-icon>delete</mat-icon>
                </button>
              </div>
            </ng-template>
          </td>
        </ng-container>

        <!-- Header and row definitions -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      <mat-paginator #paginator [pageSizeOptions]="[5, 10, 25, 50]" showFirstLastButtons [pageSize]="10"></mat-paginator>
    </div>
  </mat-card>

  <mat-card class="table-card" *ngIf="!data.length">
    <mat-card-header>
      <mat-card-title>📊 Expense Report</mat-card-title>
    </mat-card-header>
    <div class="no-data">
      <mat-icon style="font-size: 48px; color: #999; margin-bottom: 16px;">info</mat-icon>
      <p>No expense data found.</p>
    </div>
  </mat-card>
</div>
