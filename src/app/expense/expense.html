<!-- Page Container -->
<div class="expense-container">

  <!-- Form Card -->
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>💰 Expense Entry</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="expenseForm" class="form-grid">

        <!-- Date Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Date</mat-label>
          <input matInput [matDatepicker]="picker" [matDatepickerFilter]="dateFilter" formControlName="date">
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
          <mat-icon matPrefix>calendar_today</mat-icon>
        </mat-form-field>

        <!-- Expense Label Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Expense Label</mat-label>
          <mat-select formControlName="labelId" (selectionChange)="labelprice($event.value)">
            <mat-option *ngFor="let label of labels" [value]="label">
              {{ label.label_name }}
            </mat-option>
          </mat-select>
          <mat-icon matPrefix>label</mat-icon>
        </mat-form-field>

        <!-- Amount Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Amount</mat-label>
          <input matInput type="number" formControlName="amount" placeholder="Enter amount">
          <mat-icon matPrefix>currency_rupee</mat-icon>
        </mat-form-field>

      </form>
    </mat-card-content>

    <mat-card-actions align="end" class="button-group">
      <button mat-raised-button color="primary" (click)="addExpense()" matTooltip="Add new expense entry">
        <mat-icon>add_circle</mat-icon>
        Add Expense
      </button>
    </mat-card-actions>
  </mat-card>

  <!-- Table Card -->
  <mat-card class="table-card" *ngIf="expensesDataSource.data.length > 0">
    <mat-card-header>
      <mat-card-title>📊 Expense List</mat-card-title>
      <span class="total-amount">Total: ₹{{ getTotal() | number:'1.0-0' }}</span>
      <button mat-raised-button class="download-btn green-btn" (click)="downloadExcel()" [disabled]="expensesDataSource.data.length === 0" matTooltip="Download as Excel">
        <mat-icon>table_chart</mat-icon>
        Download Excel
      </button>
    </mat-card-header>

    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="expensesDataSource" class="full-width-table">

        <!-- Date Column -->
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let e">{{ e.date | date:'dd-MMM-yyyy' }}</td>
        </ng-container>

        <!-- Label Column -->
        <ng-container matColumnDef="label">
          <th mat-header-cell *matHeaderCellDef>Label</th>
          <td mat-cell *matCellDef="let e">{{ e.labelName }}</td>
        </ng-container>

        <!-- Amount Column -->
        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef>Amount</th>
          <td mat-cell *matCellDef="let e">₹{{ e.amount | number:'1.0-0' }}</td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let e; let i = index" class="action-cell">
            <button mat-icon-button color="warn" (click)="removeExpense(i)" matTooltip="Delete entry">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
      <mat-paginator #paginator [pageSizeOptions]="[5, 10, 25, 50]" showFirstLastButtons [pageSize]="10"></mat-paginator>
    </div>

    <mat-card-actions align="end" class="button-group footer-actions">
      <button mat-raised-button color="accent" (click)="saveAll()" matTooltip="Save all entries to database">
        <mat-icon>save</mat-icon>
        Save All
      </button>
    </mat-card-actions>
  </mat-card>

</div>
