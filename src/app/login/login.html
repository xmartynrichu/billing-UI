<div class="login-wrapper">
  <div class="login-box">
    <div class="logo-section">
      <img src="./../../assets/img/harbour-logo.png" alt="Fishing Harbour" />
      <h2>Fishing Harbour Billing System</h2>
      <p>Authority Login</p>
    </div>

    <form (ngSubmit)="login()">
      <div class="input-group">
        <label>Username</label>
        <input
          type="text"
          placeholder="Enter username"
          name="username"
          [(ngModel)]="username"
          required
        />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input
          type="password"
          placeholder="Enter password"
          name="password"
          [(ngModel)]="password"
          required
        />
      </div>

      <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="signup-link">
      <p>Don't have an account? <a href="javascript:void(0);" (click)="openModal()">Sign Up</a></p>
    </div>

    <div class="footer">
      <span>© 2026 Fishing Harbour Authority</span>
    </div>
  </div>

  <!-- Sign Up Modal -->
  <div *ngIf="showModal" class="modal-overlay" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Create New Account</h3>
        <button type="button" class="close-btn" (click)="closeModal()">×</button>
      </div>

      <form (ngSubmit)="signup()" class="signup-form">
        <div class="input-group">
          <label>Full Name *</label>
          <input
            type="text"
            placeholder="Enter your full name"
            name="user_name"
            [(ngModel)]="newUser.user_name"
            required
          />
        </div>

        <div class="input-group">
          <label>Username *</label>
          <input
            type="text"
            placeholder="Choose a username"
            name="user_id"
            [(ngModel)]="newUser.user_id"
            required
          />
        </div>

        <div class="input-group">
          <label>Password *</label>
          <input
            type="password"
            placeholder="Enter a password"
            name="pass_wrd"
            [(ngModel)]="newUser.pass_wrd"
            required
          />
        </div>

        <div class="input-group">
          <label>Email</label>
          <input
            type="email"
            placeholder="Enter your email"
            name="email_id"
            [(ngModel)]="newUser.email_id"
          />
        </div>

        <div class="input-group">
          <label>Mobile Number</label>
          <input
            type="tel"
            placeholder="Enter your mobile number"
            name="mobile_number"
            [(ngModel)]="newUser.mobile_number"
          />
        </div>

        <div class="input-group">
          <label>Date of Birth</label>
          <input
            type="date"
            name="dateofbirth"
            [(ngModel)]="newUser.dateofbirth"
          />
        </div>

        <button type="submit" class="signup-btn">Create Account</button>
        <button type="button" class="cancel-btn" (click)="closeModal()">Cancel</button>
      </form>
    </div>
  </div>
</div>
